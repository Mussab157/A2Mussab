<div th:replace="~{generic :: html}">
  <div th:fragment="content">
    <h3>Movie List</h3>

    <!-- Search Form -->
    <form method="get" th:action="@{/movies/search}" class="mb-4">
      <div class="row g-2">
        <div class="col">
          <input type="text" name="title" class="form-control"
                 placeholder="Search by title" th:value="${title}">
        </div>
        <div class="col">
          <input type="text" name="genre" class="form-control"
                 placeholder="Search by genre" th:value="${genre}">
        </div>
        <div class="col-auto">
          <button type="submit" class="btn btn-primary">Search</button>
          <a th:href="@{/movies}" class="btn btn-secondary">Clear</a>
        </div>
      </div>
    </form>

    <div th:if="${movies.isEmpty()}" class="alert alert-warning">
      No movies found.
    </div>

    <table th:if="${!movies.isEmpty()}" class="table table-striped">
      <thead>
      <tr>
        <th>Title</th>
        <th>Genre</th>
        <th>Year</th>
        <th>Rating</th>
        <th>Director</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="movie : ${movies}">
        <td th:text="${movie.title}"></td>
        <td th:text="${movie.genre}"></td>
        <td th:text="${movie.date}"></td>
        <td th:text="${movie.rating}"></td>
        <td th:text="${movie.director}"></td>
        <td>
          <a th:href="@{/movies/edit/{id}(id=${movie.id})}" class="btn btn-sm btn-warning">Edit</a>
          <a th:href="@{/movies/delete/{id}(id=${movie.id})}" class="btn btn-sm btn-danger"
             onclick="return confirm('Are you sure?')">Delete</a>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
