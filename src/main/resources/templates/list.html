<div th:replace="~{generic :: html}">
  <div th:fragment="content">
    <h3>Movies</h3>

    <form th:action="@{/search}" method="get" class="mb-3 d-flex gap-2">
      <input type="text" name="title" class="form-control" placeholder="Search Title">
      <input type="text" name="genre" class="form-control" placeholder="Search Genre">
      <button type="submit" class="btn btn-secondary">Search</button>
    </form>

    <table class="table table-bordered">
      <thead>
      <tr>
        <th>Title</th>
        <th>Genre</th>
        <th>Rating</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="m : ${movies}">
        <td th:text="${m.title}"></td>
        <td th:text="${m.genre}"></td>
        <td th:text="${m.rating}"></td>
        <td>
          <a th:href="@{/movies/edit/{id}(id=${m.id})}" class="btn btn-sm btn-info">Edit</a>
          <a th:href="@{/movies/delete/{id}(id=${m.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')">Delete</a>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
