<div th:replace="~{generic :: html}">
<div th:fragment="content">
    <h3 th:text="${movie.id == 0} ? 'Add Movie' : 'Edit Movie'"></h3>

    <form th:action="@{/movies/save}" th:object="${movie}" method="post" style="max-width: 500px;">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" th:field="*{title}" class="form-control">
            <small class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></small>
        </div>

        <div class="mb-3">
            <label class="form-label">Genre</label>
            <input type="text" th:field="*{genre}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Rating (0-10)</label>
            <input type="number" th:field="*{rating}" class="form-control">
            <small class="text-danger" th:if="${#fields.hasErrors('rating')}" th:errors="*{rating}"></small>
        </div>

        <button type="submit" class="btn btn-primary">Save Movie</button>
        <a th:href="@{/movies}" class="btn btn-link">Cancel</a>
    </form>
</div>
</div>
