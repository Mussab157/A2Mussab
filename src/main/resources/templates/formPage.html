<form th:action="@{/movies/save}" th:object="${movie}" method="post" style="max-width: 500px;">
    <input type="hidden" th:field="*{id}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" th:field="*{title}" class="form-control">
        <small class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></small>
    </div>

    <div class="mb-3">
        <label class="form-label">Genre</label>
        <input type="text" th:field="*{genre}" class="form-control">
        <small class="text-danger" th:if="${#fields.hasErrors('genre')}" th:errors="*{genre}"></small>
    </div>

    <div class="mb-3">
        <label class="form-label">Release Year</label>
        <input type="number" th:field="*{date}" class="form-control" min="1800" max="2026", placeholder="1800" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Rating (0–10)</label>
        <input type="number" th:field="*{rating}" class="form-control" min="0" max="10" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Director</label>
        <input type="text" th:field="*{director}" class="form-control">
        <small class="text-danger" th:if="${#fields.hasErrors('director')}" th:errors="*{director}"></small>
    </div>

    <div class="mb-3">
        <label class="form-label">Duration (minutes)</label>
        <input type="number" th:field="*{durationMinutes}" class="form-control" min="60" max="240" required>
    </div>

    <button type="submit" class="btn btn-primary">Save Movie</button>
    <a th:href="@{/movies}" class="btn btn-link">Cancel</a>
</form>
